name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ai-agentic-2026
  REGION: us-central1
  SERVICE: ai-agentic
  REGISTRY: us-central1-docker.pkg.dev/ai-agentic-2026/ai-agentic/app
  WIF_PROVIDER: projects/1004402056084/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: ai-agentic-sa@ai-agentic-2026.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE="${{ env.REGISTRY }}:${{ github.sha }}"
          docker build --platform linux/amd64 -t "$IMAGE" -t "${{ env.REGISTRY }}:latest" .
          docker push "$IMAGE"
          docker push "${{ env.REGISTRY }}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image="${{ env.REGISTRY }}:${{ github.sha }}" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet
